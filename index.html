<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Favicons Aquidauana</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <header id="app-header" class="app-header">
        <div class="app-header__content">
            <div class="brand">
                <div class="brand__mark">A</div>
                <div class="brand__text">
                    <h1 class="brand__title">Gerador de Favicons</h1>
                    <p class="brand__subtitle">Aquidauana</p>
                </div>
            </div>

            <nav class="top-menu" aria-label="Menu principal">
                <button id="tab-button-generator" class="tab-button tab-button--active" type="button" data-tab="generator">
                    Gerador
                </button>
                <button id="tab-button-colors" class="tab-button" type="button" data-tab="colors">
                    Cores
                </button>
            </nav>
        </div>
    </header>

    <main id="app-main" class="page">
        <section id="tab-generator" class="tab-panel">
            <div class="page-grid">
                <section id="icons-panel" class="panel" aria-labelledby="icons-title">
                    <div class="panel__header">
                        <h2 id="icons-title" class="panel__title">Escolha o ícone</h2>
                    </div>

                    <div id="icon-list" class="icon-list" aria-label="Lista de ícones"></div>

                    <div class="form-area">
                        <h2 class="panel__title">Fundo</h2>

                        <div class="shape-list" aria-label="Formato do fundo">
                            <button id="shape-transparent" class="shape-button shape-button--active" type="button" data-shape="transparent">
                                Transparente
                            </button>
                            <button id="shape-rounded" class="shape-button" type="button" data-shape="rounded">
                                Quadrado
                            </button>
                            <button id="shape-circle" class="shape-button" type="button" data-shape="circle">
                                Círculo
                            </button>
                        </div>

                        <div id="bg-color-area" class="field field--hidden">
                            <label class="field__label" for="bg-color-input">Cor do fundo</label>
                            <div class="color-field">
                                <input id="bg-color-input" class="color-field__input" type="color" value="#ffffff">
                                <span id="bg-color-value" class="color-field__value">#ffffff</span>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="preview-panel" class="panel" aria-labelledby="preview-title">
                    <div class="panel__header">
                        <h2 id="preview-title" class="panel__title">Prévia</h2>
                    </div>

                    <div class="preview-tabs">
                        <div class="browser-tab browser-tab--light">
                            <div id="preview-tab-light" class="browser-tab__icon"></div>
                            <span class="browser-tab__text">Aquidauana</span>
                        </div>

                        <div class="browser-tab browser-tab--dark">
                            <div id="preview-tab-dark" class="browser-tab__icon"></div>
                            <span class="browser-tab__text">Aquidauana</span>
                        </div>
                    </div>

                    <div id="main-preview" class="main-preview"></div>

                    <div class="download-area">
                        <button id="download-svg" class="action-button action-button--main" type="button">
                            Baixar SVG
                        </button>
                        <button id="download-png-32" class="action-button" type="button" data-size="32">
                            PNG 32
                        </button>
                        <button id="download-png-180" class="action-button" type="button" data-size="180">
                            PNG 180
                        </button>
                        <button id="download-png-512" class="action-button" type="button" data-size="512">
                            PNG 512
                        </button>
                    </div>

                    <div class="code-area">
                        <div class="code-area__header">
                            <span class="code-area__label">HTML</span>
                            <button id="copy-code" class="small-button" type="button">Copiar</button>
                        </div>
                        <pre class="code-box"><code id="html-code"></code></pre>
                    </div>
                </section>
            </div>
        </section>

        <section id="tab-colors" class="tab-panel tab-panel--hidden">
            <section id="colors-panel" class="panel">
                <div class="panel__header">
                    <h2 class="panel__title">Cores usadas</h2>
                </div>

                <div class="color-list">
                    <div class="color-card">
                        <span class="color-card__sample color-card__sample--blue"></span>
                        <div>
                            <strong>Azul principal</strong>
                            <span>#253573</span>
                        </div>
                    </div>
                    <div class="color-card">
                        <span class="color-card__sample color-card__sample--sky"></span>
                        <div>
                            <strong>Azul claro</strong>
                            <span>#00a3e0</span>
                        </div>
                    </div>
                    <div class="color-card">
                        <span class="color-card__sample color-card__sample--gold"></span>
                        <div>
                            <strong>Amarelo</strong>
                            <span>#f2c111</span>
                        </div>
                    </div>
                    <div class="color-card">
                        <span class="color-card__sample color-card__sample--green"></span>
                        <div>
                            <strong>Verde</strong>
                            <span>#3ca35d</span>
                        </div>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <footer id="app-footer" class="app-footer">
        <p>Projeto gratuito para estudo e uso livre.</p>
        <div id="access-counter" class="access-counter" aria-label="Contador de acessos">
            <span id="access-counter-label" class="access-counter__label">Acessos neste navegador</span>
            <strong id="access-counter-value" class="access-counter__value">0</strong>
        </div>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite">
        <span id="toast-message">Pronto.</span>
    </div>

    <canvas id="export-canvas" class="hidden-canvas"></canvas>

    <script src="src/js/model.js" defer></script>
    <script src="src/js/view.js" defer></script>
    <script src="src/js/controller.js" defer></script>
    <script src="src/js/counter.js" defer></script>
</body>
</html>
